name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests (no Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Run bbolt tests
        run: go test -race -v -count=1 ./backend/bbolt/...

      - name: Run badger tests
        run: go test -race -v -count=1 ./backend/badger/...

      - name: Run sql tests
        run: go test -race -v -count=1 ./backend/sql/...

      - name: Run sync tests
        run: go test -race -v -count=1 ./sync/...

      - name: Verify indexeddb compiles (WASM)
        run: GOOS=js GOARCH=wasm go build ./backend/indexeddb/...

  integration-tests:
    name: Integration Tests (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Run S3 tests (MinIO)
        run: go test -race -v -count=1 -timeout=120s ./backend/s3/...

      - name: Run MongoDB tests
        run: go test -race -v -count=1 -timeout=120s ./backend/mongodb/...

      - name: Run Redis tests
        run: go test -race -v -count=1 -timeout=120s ./backend/redis/...
