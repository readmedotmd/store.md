name: Banner

on:
  workflow_run:
    workflows: [Tag]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: Generate Banner
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?$' | head -n1 || echo 'v0.0.0')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate banner
        env:
          GENERATE_URL: ${{ secrets.STYLEMD_GENERATE_URL }}
          API_KEY: ${{ secrets.STYLEMD_API_KEY }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_DESC: ${{ github.event.repository.description }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p .github
          curl -sfG "$GENERATE_URL" \
            --data-urlencode "api_key=$API_KEY" \
            --data-urlencode "name=$REPO_NAME" \
            --data-urlencode "title=KEY-VALUE STORE WITH SYNC ENGINE FOR GO" \
            --data-urlencode "tagline=$REPO_DESC" \
            --data-urlencode "description=One interface. Seven backends. Built-in P2P sync." \
            --data-urlencode "version=$VERSION" \
            --data-urlencode "tags=BBolt,Badger,SQL,S3,MongoDB,Redis,IndexedDB,MIT" \
            -o .github/banner.svg

      - name: Commit banner
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/banner.svg
          if git diff --cached --quiet; then
            echo 'No changes to commit'
          else
            git commit -m 'Update banner [skip ci]'
            git push
          fi
